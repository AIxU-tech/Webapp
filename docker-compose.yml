services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Expose to host on 5433 (5432 may be used by local postgres)
    environment:
      POSTGRES_USER: aixu
      POSTGRES_PASSWORD: aixu_dev_password
      POSTGRES_DB: aixu
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aixu -d aixu"]
      interval: 5s
      timeout: 5s
      retries: 5

  seed:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DEV_DATABASE_URL}
    command: python -m backend.seed_data

  web:
    build: .
    ports:
      - "5173:5000"
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/healthz')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    env_file:
      - .env
    environment:
      # Map DEV_ variables from .env to what the app expects
      DATABASE_URL: ${DEV_DATABASE_URL}
      SECRET_KEY: ${DEV_SECRET_KEY}
      DEV_MODE: ${DEV_MODE:-false}
      # GCS: signed URLs require a service account key (not user ADC). Mount flask-sa-key.json and set path here.
      GCS_CREDENTIALS_PATH: /gcloud/flask-sa-key.json
      # Fallback if key file not mounted (won't work for signed URLs)
      GOOGLE_APPLICATION_CREDENTIALS: /gcloud/application_default_credentials.json
    volumes:
      # Service account key (required for upload/signed URLs). Create via Terraform or GCP Console.
      - ./flask-sa-key.json:/gcloud/flask-sa-key.json:ro
      # Optional: user ADC fallback (cannot sign URLs)
      - ~/.config/gcloud/application_default_credentials.json:/gcloud/application_default_credentials.json:ro

volumes:
  postgres_data:
